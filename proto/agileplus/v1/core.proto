syntax = "proto3";

package agileplus.v1;

import "agileplus/v1/common.proto";

option go_package = "github.com/phenotype/agileplus-proto/gen/go/agileplus/v1;agileplusv1";

// AgilePlusCoreService — central feature-lifecycle + audit service.
// Traceability: FR-AGP-001..010
service AgilePlusCoreService {
  // Feature RPCs
  rpc GetFeature(GetFeatureRequest) returns (GetFeatureResponse);
  rpc ListFeatures(ListFeaturesRequest) returns (ListFeaturesResponse);
  rpc GetFeatureState(GetFeatureStateRequest) returns (GetFeatureStateResponse);

  // Work-package RPCs
  rpc ListWorkPackages(ListWorkPackagesRequest) returns (ListWorkPackagesResponse);
  rpc GetWorkPackageStatus(GetWorkPackageStatusRequest) returns (GetWorkPackageStatusResponse);

  // Governance RPCs
  rpc CheckGovernanceGate(CheckGovernanceGateRequest) returns (CheckGovernanceGateResponse);
  rpc GetAuditTrail(GetAuditTrailRequest) returns (stream GetAuditTrailResponse);
  rpc VerifyAuditChain(VerifyAuditChainRequest) returns (VerifyAuditChainResponse);

  // Agent streaming + command dispatch
  rpc StreamAgentEvents(StreamAgentEventsRequest) returns (stream StreamAgentEventsResponse);
  rpc DispatchCommand(DispatchCommandRequest) returns (DispatchCommandResponse);
}

// --- Feature messages ---

message Feature {
  int64 id = 1;
  string slug = 2;
  string friendly_name = 3;
  string state = 4;
  string target_branch = 5;
  string created_at = 6;
  string updated_at = 7;
  int32 wp_count = 8;
  int32 wp_done = 9;
}

message GetFeatureRequest {
  string slug = 1;
}

message GetFeatureResponse {
  Feature feature = 1;
}

message ListFeaturesRequest {
  string state_filter = 1;
}

message ListFeaturesResponse {
  repeated Feature features = 1;
}

message GetFeatureStateRequest {
  string slug = 1;
}

message GetFeatureStateResponse {
  FeatureState feature_state = 1;
}

// --- Work package messages ---

message WorkPackageStatus {
  int64 id = 1;
  string title = 2;
  string state = 3;
  int32 sequence = 4;
  string agent_id = 5;
  string pr_url = 6;
  string pr_state = 7;
  repeated int32 depends_on = 8;
  repeated string file_scope = 9;
}

message ListWorkPackagesRequest {
  string feature_slug = 1;
  string state_filter = 2;
}

message ListWorkPackagesResponse {
  repeated WorkPackageStatus packages = 1;
}

message GetWorkPackageStatusRequest {
  string feature_slug = 1;
  int32 wp_sequence = 2;
}

message GetWorkPackageStatusResponse {
  WorkPackageStatus work_package_status = 1;
}

// --- Governance / audit messages ---

message CheckGovernanceGateRequest {
  string feature_slug = 1;
  string transition = 2;
}

message CheckGovernanceGateResponse {
  bool passed = 1;
  repeated GateViolation violations = 2;
}

message GetAuditTrailRequest {
  string feature_slug = 1;
  int64 after_id = 2;
}

message AuditEntry {
  int64 id = 1;
  string feature_slug = 2;
  int32 wp_sequence = 3;
  string timestamp = 4;
  string actor = 5;
  string transition = 6;
  repeated string evidence_refs = 7;
  bytes prev_hash = 8;
  bytes hash = 9;
}

message GetAuditTrailResponse {
  AuditEntry audit_entry = 1;
}

message VerifyAuditChainRequest {
  string feature_slug = 1;
}

message VerifyAuditChainResponse {
  bool valid = 1;
  int64 entries_verified = 2;
  string first_invalid_id = 3;
  string error_message = 4;
}

// --- Streaming / command messages ---

message StreamAgentEventsRequest {
  string feature_slug = 1;
}

message AgentEvent {
  string event_type = 1;
  string feature_slug = 2;
  int32 wp_sequence = 3;
  string agent_id = 4;
  map<string, string> payload = 5;
  string timestamp = 6;
}

message StreamAgentEventsResponse {
  AgentEvent event = 1;
}

message DispatchCommand {
  string command = 1;
  string feature_slug = 2;
  map<string, string> args = 3;
}

message DispatchCommandRequest {
  DispatchCommand command = 1;
}

message DispatchCommandResponse {
  CommandResponse result = 1;
}

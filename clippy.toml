# AgilePlus workspace clippy config.
#
# Overrides the Phenotype-org parent `clippy.toml` so the MSRV matches the
# version pinned in `rust-toolchain.toml` and `Cargo.toml`'s
# `[workspace.package].rust-version`. Without this override, clippy emits
# "the MSRV in `clippy.toml` and `Cargo.toml` differ" on every crate and the
# `-D warnings` gate cannot pass cleanly.
msrv                      = "1.85.0"
avoid-breaking-exported-api = true
allow-dbg-in-tests        = true
disallowed-methods        = []

{% for media in media_assets %}
  <article class="bg-zinc-900 border border-zinc-700 rounded overflow-hidden">
    <button type="button"
            class="w-full h-36 block bg-zinc-950 flex items-center justify-center border-b border-zinc-700"
            data-media-url="{{ media.url_or_path }}"
            data-media-title="{{ media.name }}"
            @click="openMedia($event)">
      <img src="{{ media.url_or_path }}"
           alt="{{ media.name }}"
           class="max-h-full max-w-full object-contain pointer-events-none"
           onerror="this.style.display='none'" />
      <div class="text-xs text-zinc-400">Open asset</div>
    </button>
    <div class="p-3 space-y-2">
      <div class="flex items-start justify-between">
        <h3 class="font-semibold text-sm">{{ media.name }}</h3>
        <span class="text-xs text-zinc-500">{{ media.kind }}</span>
      </div>
      <div class="text-xs text-zinc-400">Source: {{ media.source }}</div>
      <div class="text-xs text-zinc-500">
        {% if media.size_bytes > 0 %}
          Size: {{ media.size_bytes }} bytes
        {% else %}
          Size: unknown
        {% endif %}
      </div>
      <p class="text-xs break-all text-zinc-300">{{ media.url_or_path }}</p>
    </div>
  </article>
{% else %}
  <p class="text-zinc-500 text-sm">No media assets available.</p>
{% endfor %}

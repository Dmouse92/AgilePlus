{% for media in media_assets %}
  <article class="media-card">
    <div class="media-card-image-container">
      <button type="button"
              class="media-card-button w-full block"
              data-media-url="{{ media.url_or_path }}"
              data-media-title="{{ media.name }}"
              @click="openMedia($event)"
              aria-label="Open {{ media.name }}">
        <img src="{{ media.url_or_path }}"
             alt="{{ media.name }}"
             class="media-card-image"
             onerror="this.style.display='none'" />
        <div class="media-card-button-overlay">
          <div class="media-card-button-label">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM13 10H7"/>
            </svg>
            View
          </div>
        </div>
      </button>
    </div>
    <div class="media-card-info">
      <div class="flex items-start justify-between">
        <h3 class="media-card-title">{{ media.name }}</h3>
        <span class="text-xs text-zinc-500 ml-2 flex-shrink-0">{{ media.kind }}</span>
      </div>
      <div class="text-xs text-zinc-400">Source: {{ media.source }}</div>
      <div class="text-xs text-zinc-500">
        {% if media.size_bytes > 0 %}
          {{ media.size_bytes }} bytes
        {% else %}
          Size: unknown
        {% endif %}
      </div>
      <p class="text-xs break-all text-zinc-400 line-clamp-2">{{ media.url_or_path }}</p>
    </div>
  </article>
{% else %}
  <p class="text-zinc-500 text-sm">No media assets available.</p>
{% endfor %}

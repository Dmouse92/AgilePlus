coverage:
  status:
    project:
      default:
        target: 80%
        threshold: 1%
        if_ci_failed: error
    patch:
      default:
        target: 80%
        threshold: 1%
        if_ci_failed: error

component_management:
  default_rules:
    statuses:
      - type: project
        target: 80%
        threshold: 1%
  individual_components:
    - component_id: agileplus-trace-validator
      name: agileplus-trace-validator
      paths:
        - crates/agileplus-trace-validator/**


[package]
name = "agileplus-sqlite"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license = "MIT OR Apache-2.0"
repository = "https://github.com/KooshaPari/AgilePlus"
authors = ["kooshapari"]
description = "agileplus sqlite — Phenotype infrastructure crate (AgilePlus)"
documentation = "https://docs.rs/agileplus-sqlite"
keywords = ["phenotype", "agileplus", "sql"]
categories = ["database"]

[dependencies]
agileplus-domain = { path = "../agileplus-domain" }
agileplus-events = { path = "../agileplus-events" }
rusqlite = { version = "0.32", features = ["bundled"] }
serde.workspace = true
serde_json.workspace = true
chrono.workspace = true
async-trait = "0.1"
anyhow = "1"
tokio = { workspace = true, optional = true }

[dev-dependencies]
tokio = { workspace = true, features = ["full"] }

[features]
default = []
async = ["tokio"]

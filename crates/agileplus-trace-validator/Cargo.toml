[package]
name = "agileplus-trace-validator"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license = "MIT OR Apache-2.0"
repository = "https://github.com/KooshaPari/AgilePlus"
authors = ["kooshapari"]
description = "agileplus trace validator — Phenotype infrastructure crate (AgilePlus)"
documentation = "https://docs.rs/agileplus-trace-validator"
keywords = ["phenotype", "agileplus"]
categories = ["development-tools"]

[[bin]]
name = "agileplus-trace-validator"
path = "src/main.rs"

[dependencies]
anyhow.workspace = true
clap = { version = "4", features = ["derive"] }
serde.workspace = true
serde_json.workspace = true
thiserror.workspace = true

[dev-dependencies]
assert_cmd = "2"
predicates = "3"
tempfile.workspace = true

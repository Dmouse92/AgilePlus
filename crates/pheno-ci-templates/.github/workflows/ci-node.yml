name: ci-node

# Node-specific workflow that includes the shared
# `ci-base` and adds the `pnpm` / `vitest` / `tsc` matrix.
on:
  workflow_call:

permissions:
  contents: read

jobs:
  node:
    name: node
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: install
        run: pnpm install --frozen-lockfile

      - name: typecheck
        run: pnpm tsc --noEmit

      - name: lint
        run: pnpm lint

      - name: test
        run: pnpm test

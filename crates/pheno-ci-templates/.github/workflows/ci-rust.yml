name: ci-rust

# Rust-specific workflow that includes the shared
# `ci-base` and adds the `cargo` / `clippy` / `fmt` /
# `test` matrix.
on:
  workflow_call:

permissions:
  contents: read

jobs:
  rust:
    name: rust
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: install rust
        uses: dtolnay/rust-toolchain@stable

      - name: cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ matrix.workspace }}

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace

[package]
name = "pheno-ci-templates"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
description = "Reusable GitHub Actions workflow templates. Provides an `include:` chain (ci-base → ci-rust / ci-node / ci-python) so other repos can drop in a 3-line workflow that reuses a single source of truth for checkout, cache, and concurrency settings."
keywords = ["phenotype", "github-actions", "ci", "templates", "yaml"]
categories = ["development-tools", "build-tool"]
publish = false

[lib]
name = "pheno_ci_templates"
path = "src/lib.rs"

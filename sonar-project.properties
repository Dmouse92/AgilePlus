# SonarCloud Configuration
# SonarCloud URL: https://sonarcloud.io
# Organization: stealth-startup-3u (from Sentry org)

sonar.projectKey=KooshaPari_AgilePlus
sonar.organization=kooshapari
sonar.projectName=AgilePlus
sonar.projectVersion=1.0.0

# Sources
sonar.sources=.
sonar.exclusions=**/*.lock,**/target/**,**/.git/**,**/node_modules/**,**/__pycache__/**,**/*.toml

# Language
sonar.language=rust
sonar.rust.includetests=true

# Quality Gate
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300

# Coverage
sonar.coverage.jacoco.xmlReportsPath=coverage/target
sonar.coverage.oversizeReports=target/tarpaulin

# Pull Request Analysis
sonar.pullrequest.provider=github
sonar.pullrequest.github.repository=KooshaPari/AgilePlus

# Security
sonar.sast.analyze=true
sonar.security Hotspots=

# Advanced
sonar.sourceEncoding=UTF-8
sonar.log.level=INFO

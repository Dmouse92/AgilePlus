version: "3"

tasks:
  test-nextest:
    desc: Run the Rust workspace test suite with cargo-nextest.
    cmds:
      - nextest run --workspace --profile default --cargo-quiet

  ci-nextest:
    desc: Run the Rust workspace test suite with cargo-nextest and export JUnit XML.
    cmds:
      - nextest run --workspace --profile default --cargo-quiet --no-fail-fast --export-junit target/nextest/junit.xml

  coverage:
    desc: Measure code coverage (SSOT: see grade.sh for the canonical command).
    cmds:
      - cargo llvm-cov --workspace --fail-under-lines 85

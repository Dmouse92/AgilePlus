name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python:
    name: Python (lint + test)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache uv packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-packages-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: uv-packages-${{ runner.os }}-

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install project
        run: |
          if [ -f pyproject.toml ]; then
            uv sync --all-extras --dev || uv pip install --system -e ".[dev]" || uv pip install --system -e .
          elif [ -f requirements.txt ]; then
            uv pip install --system -r requirements.txt
            [ -f requirements-dev.txt ] && uv pip install --system -r requirements-dev.txt || true
          else
            uv pip install --system -e . || true
          fi
          uv pip install --system ruff pytest pytest-cov mypy bandit safety

      - name: Ruff format check
        run: ruff format --check .

      - name: Ruff lint
        run: ruff check .

      - name: Mypy strict
        run: mypy src/ --strict

      - name: Bandit security scan
        run: bandit -r src/ -f txt 2>&1 || true

      - name: Safety dependency check
        run: safety check --output text 2>&1 || true

      - name: Pytest + coverage
        run: pytest --cov=src/dispatch_mcp --cov-fail-under=80 -q

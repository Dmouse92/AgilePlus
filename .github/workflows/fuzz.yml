name: Fuzz

on:
  pull_request:
    paths:
      - ".github/workflows/fuzz.yml"
      - "Cargo.toml"
      - "crates/agileplus-domain/**"
      - "fuzz/**"
  schedule:
    - cron: "43 4 * * 0"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fuzz-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cargo-fuzz:
    name: cargo-fuzz domain smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            fuzz

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked --version 0.13.1

      - name: Build fuzz targets
        run: cargo fuzz build feature_deserialize

      - name: Run fuzz smoke
        run: cargo fuzz run feature_deserialize -- -max_total_time=30 -timeout=10

name: VitePress Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    uses: KooshaPari/phenoShared/.github/workflows/vitepress-pages.yml@3041385
    with:
      concurrency_group: agileplus-vitepress-pages
      custom_domain: "true"
    permissions:
      contents: read
      pages: write
      id-token: write

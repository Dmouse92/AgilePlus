name: autograder

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  autograder:
    name: Autograder
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          shared-key: "autograder"

      - name: Gate 1 — Workspace build
        run: cargo build --workspace
        env:
          RUSTFLAGS: "-D warnings"

      - name: Gate 2 — Workspace tests
        run: cargo test --workspace
        env:
          RUSTFLAGS: "-D warnings"

      - name: Gate 3 — Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
        env:
          RUSTFLAGS: "-D warnings"

      - name: Gate 4 — Cargo deny
        run: |
          cargo install --locked cargo-deny
          cargo deny check
        env:
          RUSTFLAGS: "-D warnings"

      - name: Gate 5 — Cargo audit
        run: |
          cargo install --locked cargo-audit
          cargo audit
        env:
          RUSTFLAGS: "-D warnings"

      - name: Gate 6 — Cargo machete
        run: |
          cargo install --locked cargo-machete
          cargo machete
        env:
          RUSTFLAGS: "-D warnings"

      - name: Emit autograde report
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          mkdir -p worklogs
          jq -n \
            --arg timestamp "$TIMESTAMP" \
            --arg repo "AgilePlus" \
            --arg branch "${{ github.head_ref }}" \
            --arg pr "${{ github.event.number }}" \
            '{
              generated_at: $timestamp,
              repo: $repo,
              branch: $branch,
              pr: $pr,
              gates: {
                build: "passed",
                test: "passed",
                clippy: "passed",
                cargo_deny: "passed",
                cargo_audit: "passed",
                cargo_machete: "passed"
              },
              overall: "passed"
            }' > worklogs/autograde-${TIMESTAMP}.json
          echo "Autograde report emitted"
        if: always()

name: Tag Automation
# Delegates to phenoShared reusable workflow.
# See: https://github.com/KooshaPari/phenoShared/blob/main/.github/workflows/tag-automation.yml

on:
  push:
    tags:
      - 'v*'
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


jobs:
  tag:
    uses: KooshaPari/phenoShared/.github/workflows/tag-automation.yml@438e2e71e448c9f1f47f184d3ca4acbb28928677  # main
    permissions:
      contents: write

name: Tag Automation
# Delegates to phenoShared reusable workflow.
# See: https://github.com/KooshaPari/phenoShared/blob/main/.github/workflows/tag-automation.yml

on:
  push:
    tags:
      - 'v*'
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


jobs:
  tag:
    uses: KooshaPari/phenoShared/.github/workflows/tag-automation.yml@58a298df8b37765e3d04ff975de22d3dd88bfbd9  # main
    permissions:
      contents: write

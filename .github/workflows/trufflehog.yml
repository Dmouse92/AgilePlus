name: TruffleHog Secrets Scan
on:
  push:
    branches: [main, "chore/**", "feat/**", "fix/**"]
  pull_request:
    branches: [main, "chore/**", "feat/**", "fix/**"]
  workflow_dispatch:
permissions:
  contents: read
  actions: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


jobs:
  trufflehog:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@ac0805e53b065e7188181fc80dce1800dfa51ab9  # v3.92.0 — SHA-pinned (matches sast-quick.yml)
        with:
          extra_args: --only-verified
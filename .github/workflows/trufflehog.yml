name: TruffleHog Secrets Scan
on:
  push:
    branches: [main, "chore/**", "feat/**", "fix/**"]
  pull_request:
    branches: [main, "chore/**", "feat/**", "fix/**"]
  workflow_dispatch:
jobs:
  trufflehog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@4
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

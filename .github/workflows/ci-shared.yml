name: CI (shared)

# Top-level consolidated CI gate that delegates to the shared
# phenotype-actions reusable workflows. Sits alongside the
# pre-existing per-tool workflows (cargo-deny, cargo-audit,
# cargo-machete, autograder, quality-gate, …) — those keep
# their custom logic. This file is the canonical entry point
# for the *hardened* gate set, used for branch protection.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded PR runs; queue main-branch runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  rust-ci:
    name: Rust CI (cargo fmt / check / clippy / test)
    uses: kooshapari/phenotype-actions/.github/workflows/rust-ci.yml@v0.1.0
    with:
      toolchain: "stable"
      cache-key-prefix: "agileplus-rust"
      manifest-path: "."
      working-directory: "."

  cargo-deny:
    name: cargo-deny (license + advisory + bans + sources)
    uses: kooshapari/phenotype-actions/.github/workflows/cargo-deny.yml@v0.1.0
    with:
      toolchain: "stable"
      cache-key-prefix: "agileplus-deny"
      manifest-path: "."
      working-directory: "."

  cargo-audit:
    name: cargo-audit (RustSec)
    uses: kooshapari/phenotype-actions/.github/workflows/cargo-audit.yml@v0.1.0
    with:
      toolchain: "stable"
      cache-key-prefix: "agileplus-audit"
      manifest-path: "."
      working-directory: "."

  coverage:
    name: coverage (>= 70%)
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    uses: kooshapari/phenotype-actions/.github/workflows/coverage.yml@v0.1.0
    with:
      toolchain: "stable"
      cache-key-prefix: "agileplus-coverage"
      manifest-path: "."
      working-directory: "."
      min-coverage: 70
    secrets:
      codecov-token: ${{ secrets.CODECOV_TOKEN }}

  scorecard:
    name: OSSF Scorecard
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.event_name == 'branch_protection_rule'
    uses: kooshapari/phenotype-actions/.github/workflows/scorecard.yml@v0.1.0
    with:
      results-format: "sarif"
      results-file: "scorecard-results.sarif"

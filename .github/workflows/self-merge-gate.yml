name: self-merge-gate
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Delegates to phenoShared reusable workflow.
# See: https://github.com/KooshaPari/phenoShared/blob/main/.github/workflows/self-merge-gate.yml

on: [pull_request_review]
jobs:
  gate:
    uses: KooshaPari/phenoShared/.github/workflows/self-merge-gate.yml@58a298df8b37765e3d04ff975de22d3dd88bfbd9  # main

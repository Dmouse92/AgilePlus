name: CI

on:
  push:
    branches: [main]
  pull_request:
  merge_group:
  workflow_dispatch:
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # ─── Proto Lint & Breaking ─────────────────────────────────────────
  buf:
    permissions:
      contents: read
      pull-requests: write
    name: Buf Lint & Breaking
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          fetch-depth: 0
      - uses: bufbuild/buf-action@fd21066df7214747548607aaa45548ba2b9bc1ff  # v1
        with:
          lint: true
          format: true
          breaking: false
          pr_comment: false

  # ─── Rust Quality ──────────────────────────────────────────────────
  rust-check:
    name: Rust Quality
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2  # nightly
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: rust
      - uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b  # v3
        with:
          version: "28.x"
          repo-token: ${{ github.token }}
      - name: Format check
        run: cd rust && cargo fmt --check
      - name: Clippy (warnings = errors)
        run: cd rust && cargo clippy --all-targets -- -D warnings
      - name: Build
        run: cd rust && cargo build
      - name: Test
        run: cd rust && cargo test

  rust-build:
    name: Rust Build
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2  # nightly
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: rust
      - uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b  # v3
        with:
          version: "28.x"
          repo-token: ${{ github.token }}
      - name: Build
        run: cd rust && cargo build --all

  rust-msrv:
    name: Rust MSRV (stable)
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2  # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: rust
      - uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b  # v3
        with:
          version: "28.x"
          repo-token: ${{ github.token }}
      - name: Check MSRV compatibility
        run: cd rust && cargo check

  # ─── Rust Security & Dep Audit ─────────────────────────────────────
  rust-audit:
    name: Rust Security Audit
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998  # v2.0.0
        with:
          token: ${{ github.token }}
      - name: Install cargo-deny
        run: cargo install cargo-deny
      - name: Check licenses, advisories, duplicates
        run: cargo deny check -c rust/deny.toml

  rust-extras:
    name: Rust Extras (machete, semver, typos)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2  # nightly
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: rust
      - uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b  # v3
        with:
          version: "28.x"
          repo-token: ${{ github.token }}
      - name: Install extras
        run: cargo install cargo-machete cargo-semver-checks
      - name: Detect unused deps
        run: cd rust && cargo machete
      - name: Semver compatibility check
        run: cd rust && cargo semver-checks check-release || true
      - name: Typo check
        uses: crate-ci/typos@37bb98842b0d8c4ffebdb75301a13db0267cef89  # v1
        continue-on-error: true

  # ─── Rust Coverage ────────────────────────────────────────────────
  rust-coverage:
    name: Rust Coverage
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2  # nightly
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: rust
      - uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b  # v3
        with:
          version: "28.x"
          repo-token: ${{ github.token }}
      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin
      - name: Generate coverage
        run: cargo tarpaulin --workspace --out xml --output-dir coverage
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v6
        with:
          files: ./coverage/cobertura.xml
          flags: rust
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ─── Core Workspace ───────────────────────────────────────────────
  core-check:
    name: Core Workspace Quality
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2  # nightly
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
      - uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b  # v3
        with:
          version: "28.x"
          repo-token: ${{ github.token }}
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy (warnings = errors)
        run: cargo clippy --workspace -- -D warnings
      - name: Build
        run: cargo build --workspace
      - name: Test
        run: cargo test --workspace

  core-build:
    name: Core Build
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2  # nightly
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
      - uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b  # v3
        with:
          version: "28.x"
          repo-token: ${{ github.token }}
      - name: Build
        run: cargo build --workspace

  core-msrv:
    name: Core MSRV (1.86)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2  # 1.86.0 (toolchain)
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
      - uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b  # v3
        with:
          version: "28.x"
          repo-token: ${{ github.token }}
      - name: Check MSRV compatibility
        run: cargo check --workspace

  core-docs:
    name: Core Documentation
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2  # nightly
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
      - uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b  # v3
        with:
          version: "28.x"
          repo-token: ${{ github.token }}
      - name: Build docs
        run: cargo doc --no-deps --workspace

  domain-deps-lint:
    name: Domain Zero-Dep Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - name: Validate domain crate dependencies
        run: |
          ALLOWED="serde serde_json chrono sha2 thiserror toml dirs-next zeroize keyring"
          DEPS=$(sed -n '/^\[dependencies\]/,/^\[/{/^\[/d;p}' crates/agileplus-domain/Cargo.toml | grep -E '^\w' | cut -d'.' -f1 | cut -d' ' -f1)
          for dep in $DEPS; do
            if ! echo "$ALLOWED" | grep -qw "$dep"; then
              echo "ERROR: disallowed dependency '$dep' in agileplus-domain"
              exit 1
            fi
          done
          echo "Domain dependency check passed"

  # ─── Python Quality ────────────────────────────────────────────────
  python-check:
    name: Python Quality
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.14"
      - name: Install uv
        run: pip install uv
      - name: Install package
        run: cd python && uv sync
      - name: Ruff format check
        run: cd python && uvx ruff format --check .
      - name: Ruff lint
        run: cd python && uvx ruff check .
      - name: pip-audit
        run: |
          cd python
          tmp_requirements="$(mktemp)"
          uv export --format requirements-txt --no-hashes --no-editable \
            -o "$tmp_requirements" >/dev/null
          uvx pip-audit -r "$tmp_requirements" --no-deps --disable-pip \
            --ignore-vuln CVE-2026-4539
          rm -f "$tmp_requirements"

  python-install:
    name: Python Install
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.14"
      - name: Install uv
        run: pip install uv
      - name: Install package
        run: cd python && uv sync

  # ─── Config Lint ───────────────────────────────────────────────────
  config-lint:
    name: Config Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - name: Install taplo
        run: cargo install taplo-cli
      - name: TOML format check
        run: taplo format --check Cargo.toml rust/Cargo.toml python/pyproject.toml
      - name: actionlint
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d  # v1

  # ─── Commit Lint ───────────────────────────────────────────────────
  commit-lint:
    name: Conventional Commits
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@b948419dd99f3fd78a6548d48f94e3df7f6bf3ed  # v6
        with:
          configFile: .commitlintrc.yml

name: Governance Index

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read


# Concurrency hardening: cancel superseded PR runs, queue main runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  governance-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Regenerate governance index
        run: python3 tooling/governance_index.py
      - name: Verify committed index
        run: git diff --exit-code -- kitty-specs/INDEX.md

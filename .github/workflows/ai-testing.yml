name: Testing Infrastructure
permissions: read-all

on:
  push:
    branches: [main, feat/**]
    paths:
      - 'tests/**'
      - 'vitest.config.ts'
      - 'playwright.config.ts'
      - '**.rs'
  pull_request:
    paths:
      - 'tests/**'
      - 'vitest.config.ts'
      - 'playwright.config.ts'
  schedule:
    - cron: '0 3 * * *'  # Weekly test run
  actions: read

jobs:
  bdd-tests:
    name: BDD Feature Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3d7d6820020  # v4
        with:
          node-version: '20'

      - name: Install Cucumber
        run: npm install @cucumber/cucumber

      - name: Run BDD Tests
        run: npx cucumber run tests/bdd/*.feature

  vitest-tests:
    name: Vitest Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3d7d6820020  # v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install vitest @vitest/coverage-v8

      - name: Run Vitest
        run: npx vitest run --reporter=json

  playwright-tests:
    name: Playwright Visual Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3d7d6820020  # v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: npm install @playwright/test && npx playwright install --with-deps

      - name: Run Playwright Visual Tests
        run: npx playwright test

  spec-traceability:
    name: FR Traceability Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Check FR References
        run: |
          echo "Validating FR-XXX-NNN traceability in tests"
          grep -r "FR-" tests/ 2>/dev/null | head -10 || echo "No FR references"
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


name: Sync Canary

on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


permissions:
  contents: write

concurrency:
  group: agileplus-sync-canary
  cancel-in-progress: false

jobs:
  sync-canary:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "agileplus-bot"
          git config user.email "agileplus-bot@users.noreply.github.com"

      - name: Prepare local canary ref
        run: |
          if git ls-remote --exit-code --heads origin canary >/dev/null 2>&1; then
            git fetch origin canary:canary
          else
            git branch canary "$GITHUB_SHA"
          fi

      - name: Sync canary from main
        run: git push origin main:canary

      - name: Push canary
        run: git push origin canary

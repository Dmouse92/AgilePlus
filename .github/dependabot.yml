  # --------------------------------------------------------------------------
  # Python (phenotype_traceability + tests)
  # --------------------------------------------------------------------------
  - package-ecosystem: "pip"
    directory: "/python"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
      - "agileplus"

<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 512px; height: 512px; overflow: hidden; background: #090a0c; }

  /* Base: dark room */
  .room {
    position: absolute;
    inset: 0;
    background: linear-gradient(155deg, #0d1f1e 0%, #090a0c 50%, #111518 100%);
    z-index: 0;
  }

  /* Mica Strata 1 (deepest) — teal-tinted, most offset: 14px */
  .strata-1 {
    position: absolute;
    width: 388px; height: 388px;
    border-radius: 38px;
    top: 50%; left: 50%;
    transform: translate(calc(-50% + 14px), calc(-50% + 14px));
    background: rgba(8, 44, 42, 0.85);
    box-shadow: 0 2px 8px rgba(0,0,0,0.6);
    z-index: 1;
  }

  /* Mica Strata 2 — offset 8px, medium teal-slate */
  .strata-2 {
    position: absolute;
    width: 388px; height: 388px;
    border-radius: 38px;
    top: 50%; left: 50%;
    transform: translate(calc(-50% + 7px), calc(-50% + 7px));
    background: rgba(20, 48, 48, 0.78);
    backdrop-filter: blur(3px);
    -webkit-backdrop-filter: blur(3px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    z-index: 2;
  }

  /* Mica Strata 3 — offset 2px, slightly brighter */
  .strata-3 {
    position: absolute;
    width: 388px; height: 388px;
    border-radius: 38px;
    top: 50%; left: 50%;
    transform: translate(calc(-50% + 2px), calc(-50% + 2px));
    background: rgba(25, 46, 47, 0.82);
    backdrop-filter: blur(8px) saturate(1.05);
    -webkit-backdrop-filter: blur(8px) saturate(1.05);
    box-shadow: 0 8px 32px rgba(0,0,0,0.55);
    z-index: 3;
  }

  /* Mica Strata 4 (surface) — centered, luminance noise texture */
  .strata-4 {
    position: absolute;
    width: 388px; height: 388px;
    border-radius: 38px;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background:
      repeating-linear-gradient(
        0deg,
        rgba(126,186,181,0.022) 0px,
        rgba(126,186,181,0.022) 1px,
        transparent 1px,
        transparent 3px
      ),
      repeating-linear-gradient(
        90deg,
        rgba(126,186,181,0.012) 0px,
        rgba(126,186,181,0.012) 1px,
        transparent 1px,
        transparent 4px
      ),
      linear-gradient(
        170deg,
        rgba(126,186,181,0.14) 0%,
        transparent 45%,
        rgba(9,10,12,0.18) 100%
      ),
      rgba(18, 36, 38, 0.88);
    backdrop-filter: blur(14px) saturate(1.08);
    -webkit-backdrop-filter: blur(14px) saturate(1.08);
    border: 1px solid rgba(126,186,181,0.25);
    border-bottom-color: rgba(0,0,0,0.5);
    border-right-color: rgba(0,0,0,0.4);
    box-shadow:
      0 12px 40px rgba(0,0,0,0.6),
      0 1px 0 rgba(126,186,181,0.28) inset;
    z-index: 4;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  svg { overflow: visible; }
  .ring-track { fill: none; stroke: rgba(126,186,181,0.2); stroke-width: 15; }
  .ring-arc {
    fill: none;
    stroke: #a8d8d4;
    stroke-width: 15;
    stroke-linecap: round;
    stroke-dasharray: 390;
    stroke-dashoffset: 80;
    filter: drop-shadow(0 0 8px rgba(126,186,181,0.8));
  }
  .ring-glow {
    fill: none;
    stroke: rgba(126,186,181,0.45);
    stroke-width: 25;
    stroke-linecap: round;
    stroke-dasharray: 390;
    stroke-dashoffset: 80;
    filter: blur(5px);
  }
  .bar { fill: #a8d8d4; filter: drop-shadow(0 0 5px rgba(126,186,181,0.6)); }
  .bar-dim { fill: rgba(126,186,181,0.45); }
  .plus { fill: #c8eae7; filter: drop-shadow(0 0 8px rgba(126,186,181,1.0)); }
  .arrow { fill: #a8d8d4; filter: drop-shadow(0 0 6px rgba(126,186,181,0.8)); }

  /* Strata edge peek — shows the layered depth bands visibly */
  .depth-edge {
    position: absolute;
    left: calc(50% - 194px + 7px);
    top: calc(50% - 194px + 7px);
    width: 10px;
    height: 388px;
    border-radius: 38px 0 0 38px;
    background: linear-gradient(180deg, rgba(8,44,42,0.92) 0%, rgba(20,48,48,0.7) 100%);
    z-index: 5;
    pointer-events: none;
  }
  .depth-edge-bottom {
    position: absolute;
    left: calc(50% - 194px + 7px);
    top: calc(50% + 186px);
    width: 388px;
    height: 10px;
    border-radius: 0 0 38px 38px;
    background: linear-gradient(90deg, rgba(8,44,42,0.85) 0%, rgba(20,48,48,0.55) 100%);
    z-index: 5;
    pointer-events: none;
  }
</style>
</head>
<body>
  <div class="room"></div>
  <!-- Strata depth layers — each visibly offset -->
  <div class="strata-1"></div>
  <div class="strata-2"></div>
  <div class="strata-3"></div>
  <!-- Surface strata with icon -->
  <div class="strata-4">
    <svg width="268" height="268" viewBox="0 0 268 268" xmlns="http://www.w3.org/2000/svg">
      <circle class="ring-glow" cx="134" cy="134" r="89" transform="rotate(-90 134 134)"/>
      <circle class="ring-track" cx="134" cy="134" r="89"/>
      <circle class="ring-arc" cx="134" cy="134" r="89" transform="rotate(-90 134 134)"/>
      <polygon class="arrow"
        points="134,35 125,54 143,54"
        transform="rotate(285 134 134)" />
      <rect class="bar-dim" x="96" y="152" width="14" height="38" rx="4"/>
      <rect class="bar" x="119" y="136" width="14" height="54" rx="4"/>
      <rect class="bar" x="142" y="120" width="14" height="70" rx="4"/>
      <rect class="plus" x="160" y="62" width="28" height="8" rx="4"/>
      <rect class="plus" x="170" y="52" width="8" height="28" rx="4"/>
    </svg>
  </div>
  <!-- Depth edge accents -->
  <div class="depth-edge"></div>
  <div class="depth-edge-bottom"></div>
</body>
</html>

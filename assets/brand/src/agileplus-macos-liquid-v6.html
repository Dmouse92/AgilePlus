<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 512px; height: 512px;
    background: transparent;
    overflow: hidden;
  }
  .icon-root {
    width: 512px; height: 512px;
    position: relative;
    background: transparent;
  }
  .sq {
    position: absolute;
    inset: 16px;
    border-radius: 120px;
    overflow: hidden;
  }
  .liq-base {
    position: absolute;
    inset: 0;
    background: linear-gradient(155deg,
      #5ecec6 0%,
      #2db5ab 25%,
      #1a9e95 50%,
      #157e77 75%,
      #0f6962 100%
    );
  }
  .caustic1 {
    position: absolute;
    width: 340px; height: 240px;
    top: -50px; left: -40px;
    background: radial-gradient(ellipse at 45% 40%,
      rgba(180,255,248,0.50) 0%,
      rgba(100,225,215,0.28) 45%,
      transparent 70%
    );
    filter: blur(10px);
  }
  .caustic2 {
    position: absolute;
    width: 180px; height: 300px;
    top: 10px; right: -10px;
    background: radial-gradient(ellipse at 55% 25%,
      rgba(200,255,250,0.30) 0%,
      transparent 60%
    );
    filter: blur(12px);
  }
  .refract {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(140deg,
        rgba(255,255,255,0.82) 0%,
        rgba(255,255,255,0.40) 10%,
        transparent 25%
      );
  }
  .spec1 {
    position: absolute;
    top: 14px; left: 44px;
    width: 340px; height: 130px;
    background: linear-gradient(175deg,
      rgba(255,255,255,0.85) 0%,
      rgba(255,255,255,0.50) 35%,
      rgba(255,255,255,0.10) 65%,
      transparent 100%
    );
    border-radius: 50%;
    filter: blur(7px);
    transform: rotate(-8deg);
  }
  .spec2 {
    position: absolute;
    bottom: 55px; right: 60px;
    width: 80px; height: 45px;
    background: radial-gradient(ellipse, rgba(255,255,255,0.35) 0%, transparent 70%);
    filter: blur(5px);
    border-radius: 50%;
  }
  .liq-depth {
    position: absolute;
    bottom: 0; right: 0;
    width: 260px; height: 220px;
    background: radial-gradient(ellipse at 80% 90%,
      rgba(0,55,50,0.45) 0%,
      transparent 60%
    );
  }
</style>
</head>
<body>
<div class="icon-root">
  <div class="sq">
    <div class="liq-base"></div>
    <div class="caustic1"></div>
    <div class="caustic2"></div>
    <div class="liq-depth"></div>
    <div class="refract"></div>
    <div class="spec1"></div>
    <div class="spec2"></div>

    <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;">
      <svg width="300" height="300" viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <filter id="glow">
            <feGaussianBlur stdDeviation="5" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="shadow">
            <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="rgba(0,70,65,0.55)"/>
          </filter>
        </defs>

        <!-- Left leg arc, foot=(50,248) to apex=(150,42), belly curves far-left -->
        <path d="M 50 248 C -8 192 4 80 150 42"
          stroke="rgba(255,255,255,0.93)" stroke-width="17" stroke-linecap="round" fill="none"
          filter="url(#glow)"
        />

        <!-- Right leg arc, apex=(150,42) to foot=(250,248), belly curves far-right -->
        <path d="M 150 42 C 296 80 308 192 250 248"
          stroke="rgba(255,255,255,0.93)" stroke-width="17" stroke-linecap="round" fill="none"
          filter="url(#glow)"
        />

        <!-- Arrowhead at apex, pointing upward -->
        <polygon points="150,26 133,56 167,56"
          fill="rgba(255,255,255,0.98)" filter="url(#glow)"
        />

        <!-- Arrowhead at right foot, pointing down-left -->
        <polygon points="250,266 232,240 262,236"
          fill="rgba(255,255,255,0.98)" filter="url(#glow)"
        />

        <!-- Crossbar: 3 ascending kanban columns -->
        <rect x="100" y="178" width="26" height="27" rx="5"
          fill="rgba(255,255,255,0.58)" filter="url(#shadow)"/>
        <rect x="136" y="161" width="26" height="44" rx="5"
          fill="rgba(255,255,255,0.75)" filter="url(#shadow)"/>
        <rect x="172" y="146" width="26" height="59" rx="5"
          fill="rgba(255,255,255,0.93)" filter="url(#shadow)"/>

        <!-- Crossbar baseline -->
        <line x1="88" y1="205" x2="212" y2="205"
          stroke="rgba(255,255,255,0.42)" stroke-width="5" stroke-linecap="round"
        />
      </svg>
    </div>
  </div>
</div>
</body>
</html>

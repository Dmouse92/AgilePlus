# =============================================================================
# Canonical compose file — AgilePlus dev build services
# Source of truth: repos/docker-compose.yml
#
# Orchestrated services:
#   rust-builder : AgilePlus Rust workspace build (uses ./Dockerfile.rust)
#   python-mcp   : Python MCP gateway (uses ./python/Dockerfile.python, :8000)
#
# Mirrored locations (symlinks back to this file):
#   pheno/docker-compose.yml
#   pheno/agileplus/docker-compose.yml
#   HexaKit/docker-compose.yml
#   HexaKit/agileplus/docker-compose.yml
#   PhenoDevOps/docker-compose.yml
#   PhenoDevOps/agileplus/docker-compose.yml
#
# Edit ONLY this file. The symlinks propagate changes automatically.
# Related files in this shelf:
#   docker-compose.plane.yml              — Plane.so + Dragonfly stack (canonical)
#   tests/integration/docker-compose.test.yml — full-stack integration test rig
#   PhenoDevOps/docker/docker-compose.yml — Phenotype storage infra (Dragonfly,
#                                           QuestDB, Qdrant, Meili, NATS, MinIO)
# =============================================================================
services:
  rust-builder:
    build:
      context: .
      dockerfile: Dockerfile.rust
    volumes:
      - .:/workspace
      - cargo-cache:/usr/local/cargo/registry
    working_dir: /workspace
    command: cargo build --workspace

  python-mcp:
    build:
      context: ./python
      dockerfile: Dockerfile.python
    ports:
      - "8000:8000"
    volumes:
      - ./python:/app
      - sqlite-data:/data

volumes:
  cargo-cache:
  sqlite-data:

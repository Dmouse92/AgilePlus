[workspace]
resolver = "3"
members = [
    "libs/nexus",
    "libs/plugin-registry",
    "libs/plugin-sample",
    "libs/plugin-cli",
    "libs/plugin-git",
    "libs/plugin-grpc",
    "libs/plugin-integration",
    "libs/intent-registry",
    "libs/health-monitor",
    "libs/logger",
    "libs/metrics",
    "libs/config-core",
    "libs/tracing-core",
    "libs/cli-framework",
]

[workspace.package]
version = "0.1.1"
edition = "2021"
license = "MIT"
rust-version = "1.75"
authors = ["AgilePlus Team"]
repository = "https://github.com/KooshaPari/AgilePlus"
keywords = ["agile", "project-management", "software-development"]
categories = ["Software Development", "Project Management"]

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", features = ["serde"] }
sha2 = "0.10"
tokio = { version = "1", features = ["full"] }
thiserror = "2"
anyhow = "1"
tracing = "0.1"
tracing-subscriber = "0.3"
tracing-opentelemetry = "0.32"
futures-util = "0.3"
axum = { version = "0.8", features = ["json", "macros"] }
tonic = { version = "0.13", features = ["transport"] }
tonic-build = { version = "0.13", features = ["prost"] }
prost = "0.13"
opentelemetry = { version = "0.31", features = ["trace", "metrics"] }
opentelemetry-otlp = { version = "0.31", features = [
  "trace",
  "metrics",
  "http-proto",
  "reqwest-client",
] }
opentelemetry_sdk = { version = "0.31", features = [
  "trace",
  "metrics",
  "rt-tokio",
] }
criterion = { version = "0.5", features = ["async_tokio", "html_reports"] }
time = ">=0.3.49"
trait-variant = "0.1"
async-trait = "0.1"

# Plugin crates (external from separate repos)
agileplus-plugin-core = { git = "https://github.com/KooshaPari/agileplus-plugin-core" }
agileplus-plugin-git = { git = "https://github.com/KooshaPari/agileplus-plugin-git" }
agileplus-plugin-sqlite = { git = "https://github.com/KooshaPari/agileplus-plugin-sqlite" }

# Git operations
gix = "0.71"
git2 = "0.20"

# Database
rusqlite = { version = "0.32", features = ["bundled"] }

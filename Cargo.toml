[workspace]
resolver = "3"

[workspace.package]
edition = "2024"

[package]
name = "agileplus"
version = "0.1.0"
edition.workspace = true
publish = false

[workspace.dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1"
tokio = { version = "1.39", features = ["full"] }
thiserror = "2"
anyhow = "1"
tracing = "0.1"
axum = { version = "0.8", features = ["json", "macros"] }

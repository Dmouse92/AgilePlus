<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 512px; height: 512px;
    background: transparent;
    overflow: hidden;
  }
  .icon-root {
    width: 512px; height: 512px;
    position: relative;
    background: transparent;
  }
  /* Squircle: true superellipse for Android adaptive icon */
  .sq {
    position: absolute;
    top: 20px; left: 20px; right: 20px; bottom: 20px;
    border-radius: 100px;
    overflow: hidden;
  }
  /* Frosted glass base: bright icy white-teal */
  .glass-base {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(150deg,
        rgba(255,255,255,0.94) 0%,
        rgba(218,245,243,0.90) 30%,
        rgba(192,236,233,0.86) 60%,
        rgba(208,240,238,0.92) 100%
      );
  }
  /* Blur blobs for frosted depth */
  .blob1 {
    position: absolute;
    width: 340px; height: 280px;
    top: -60px; left: -60px;
    background: radial-gradient(ellipse, rgba(126,186,181,0.40) 0%, transparent 65%);
    filter: blur(45px);
  }
  .blob2 {
    position: absolute;
    width: 260px; height: 260px;
    bottom: -40px; right: -40px;
    background: radial-gradient(ellipse, rgba(160,220,215,0.35) 0%, transparent 65%);
    filter: blur(38px);
  }
  .blob3 {
    position: absolute;
    width: 180px; height: 180px;
    top: 40px; right: 30px;
    background: radial-gradient(ellipse, rgba(255,255,255,0.60) 0%, transparent 70%);
    filter: blur(24px);
  }
  /* Frost grain */
  .frost {
    position: absolute;
    inset: 0;
    opacity: 0.16;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='256' height='256' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 256px 256px;
  }
  /* Glass edge highlight */
  .edge-shine {
    position: absolute;
    inset: 0;
    background: linear-gradient(140deg,
      rgba(255,255,255,0.72) 0%,
      rgba(255,255,255,0.15) 30%,
      transparent 55%,
      rgba(126,186,181,0.15) 100%
    );
  }
  /* Top shine strip */
  .top-shine {
    position: absolute;
    top: 8px; left: 50px; right: 50px;
    height: 70px;
    background: linear-gradient(180deg, rgba(255,255,255,0.62) 0%, transparent 100%);
    border-radius: 50%;
    filter: blur(10px);
  }
</style>
</head>
<body>
<div class="icon-root">
  <div class="sq">
    <div class="glass-base"></div>
    <div class="blob1"></div>
    <div class="blob2"></div>
    <div class="blob3"></div>
    <div class="frost"></div>
    <div class="edge-shine"></div>
    <div class="top-shine"></div>

    <!-- Artwork -->
    <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;">
      <svg width="320" height="320" viewBox="0 0 320 320" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <filter id="soft-shadow">
            <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(60,140,134,0.35)"/>
          </filter>
        </defs>
        <!-- Velocity bars: teal with translucency on glass -->
        <rect x="88" y="162" width="24" height="38" rx="5" fill="#7ebab5" opacity="0.70" filter="url(#soft-shadow)"/>
        <rect x="120" y="142" width="24" height="58" rx="5" fill="#7ebab5" opacity="0.82" filter="url(#soft-shadow)"/>
        <rect x="152" y="120" width="24" height="80" rx="5" fill="#5aa09b" opacity="0.95" filter="url(#soft-shadow)"/>
        <rect x="184" y="136" width="24" height="64" rx="5" fill="#7ebab5" opacity="0.82" filter="url(#soft-shadow)"/>
        <rect x="216" y="156" width="24" height="44" rx="5" fill="#7ebab5" opacity="0.70" filter="url(#soft-shadow)"/>

        <!-- Sprint ring: teal, open arc -->
        <circle cx="160" cy="160" r="128"
          stroke="#5aa09b" stroke-width="14"
          stroke-linecap="round"
          stroke-dasharray="580 225"
          fill="none"
          transform="rotate(-105 160 160)"
          filter="url(#soft-shadow)"
        />
        <!-- Arrow -->
        <path d="M 270 94 L 286 115 L 260 120 Z" fill="#5aa09b" filter="url(#soft-shadow)"/>

        <!-- Plus: darker teal, visible on frost -->
        <rect x="148" y="126" width="24" height="68" rx="6" fill="#3d8a85" filter="url(#soft-shadow)"/>
        <rect x="128" y="146" width="64" height="24" rx="6" fill="#3d8a85" filter="url(#soft-shadow)"/>
      </svg>
    </div>
  </div>
</div>
</body>
</html>

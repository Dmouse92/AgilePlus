<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 512px; height: 512px;
    background: transparent;
    overflow: hidden;
  }
  .icon-root {
    width: 512px; height: 512px;
    position: relative;
    background: transparent;
  }
  /* macOS: continuous superellipse squircle */
  .sq {
    position: absolute;
    inset: 16px;
    border-radius: 120px;
    overflow: hidden;
  }
  /* Vivid saturated teal liquid body */
  .liq-base {
    position: absolute;
    inset: 0;
    background: linear-gradient(155deg,
      #5ecec6 0%,
      #2db5ab 25%,
      #1a9e95 50%,
      #157e77 75%,
      #0f6962 100%
    );
  }
  /* Wet caustic light pools */
  .caustic1 {
    position: absolute;
    width: 340px; height: 240px;
    top: -50px; left: -40px;
    background: radial-gradient(ellipse at 45% 40%,
      rgba(180,255,248,0.50) 0%,
      rgba(100,225,215,0.28) 45%,
      transparent 70%
    );
    filter: blur(10px);
  }
  .caustic2 {
    position: absolute;
    width: 180px; height: 300px;
    top: 10px; right: -10px;
    background: radial-gradient(ellipse at 55% 25%,
      rgba(200,255,250,0.30) 0%,
      transparent 60%
    );
    filter: blur(12px);
  }
  /* Refractive edge fringe — bright top-left, dark bottom-right */
  .refract {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(140deg,
        rgba(255,255,255,0.82) 0%,
        rgba(255,255,255,0.40) 10%,
        transparent 25%
      );
  }
  /* PRIMARY specular sweep */
  .spec1 {
    position: absolute;
    top: 14px; left: 44px;
    width: 340px; height: 130px;
    background: linear-gradient(175deg,
      rgba(255,255,255,0.85) 0%,
      rgba(255,255,255,0.50) 35%,
      rgba(255,255,255,0.10) 65%,
      transparent 100%
    );
    border-radius: 50%;
    filter: blur(7px);
    transform: rotate(-8deg);
  }
  /* Secondary sparkle bottom-right */
  .spec2 {
    position: absolute;
    bottom: 55px; right: 60px;
    width: 80px; height: 45px;
    background: radial-gradient(ellipse, rgba(255,255,255,0.35) 0%, transparent 70%);
    filter: blur(5px);
    border-radius: 50%;
  }
  /* Deep shadow for liquid depth (NO dark vignette outside icon) */
  .liq-depth {
    position: absolute;
    bottom: 0; right: 0;
    width: 260px; height: 220px;
    background: radial-gradient(ellipse at 80% 90%,
      rgba(0,55,50,0.45) 0%,
      transparent 60%
    );
  }
</style>
</head>
<body>
<div class="icon-root">
  <div class="sq">
    <div class="liq-base"></div>
    <div class="caustic1"></div>
    <div class="caustic2"></div>
    <div class="liq-depth"></div>
    <div class="refract"></div>
    <div class="spec1"></div>
    <div class="spec2"></div>

    <!-- Artwork: white on vivid teal -->
    <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;">
      <svg width="320" height="320" viewBox="0 0 320 320" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <filter id="glow">
            <feGaussianBlur stdDeviation="5" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="shadow">
            <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="rgba(0,70,65,0.55)"/>
          </filter>
        </defs>
        <!-- Velocity bars: bright white-teal on saturated body -->
        <rect x="88" y="162" width="24" height="38" rx="5" fill="rgba(255,255,255,0.50)" filter="url(#shadow)"/>
        <rect x="120" y="142" width="24" height="58" rx="5" fill="rgba(255,255,255,0.65)" filter="url(#shadow)"/>
        <rect x="152" y="120" width="24" height="80" rx="5" fill="rgba(255,255,255,0.80)" filter="url(#shadow)"/>
        <rect x="184" y="136" width="24" height="64" rx="5" fill="rgba(255,255,255,0.65)" filter="url(#shadow)"/>
        <rect x="216" y="156" width="24" height="44" rx="5" fill="rgba(255,255,255,0.50)" filter="url(#shadow)"/>

        <!-- Sprint ring: white glow -->
        <circle cx="160" cy="160" r="128"
          stroke="rgba(255,255,255,0.95)" stroke-width="14"
          stroke-linecap="round"
          stroke-dasharray="575 230"
          fill="none"
          transform="rotate(-105 160 160)"
          filter="url(#glow)"
        />
        <!-- Arrow -->
        <path d="M 270 93 L 287 115 L 259 120 Z" fill="rgba(255,255,255,0.95)" filter="url(#glow)"/>

        <!-- Plus: bright white -->
        <rect x="148" y="126" width="24" height="68" rx="6" fill="rgba(255,255,255,0.97)" filter="url(#shadow)"/>
        <rect x="128" y="146" width="64" height="24" rx="6" fill="rgba(255,255,255,0.97)" filter="url(#shadow)"/>
      </svg>
    </div>
  </div>
</div>
</body>
</html>
